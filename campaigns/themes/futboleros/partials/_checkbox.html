<div class="field field--checkbox{% if field.errors %} has-error{% endif %}">
  <label class="checkbox-label" for="{{ field.id_for_label }}">
    {{ field }}
    <span>{{ spec.label }}{% if spec.required %} *{% endif %}</span>
  </label>
  <span class="err" data-err-for="{{ spec.key }}">{{ field.errors|join:" " }}</span>
</div>
